name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # Fast tier: pure crypto/logic unit tests. No server, no network, no
  # blockchain: runs on every push and PR in a few seconds.
  unit-tests:
    name: Unit tests (hasher / merkle / signer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install coverage

      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest tests/test_hasher.py tests/test_merkle.py tests/test_signer.py tests/test_signer_v2.py -v
          coverage report -m

  # Slow tier: real HTTP calls against a live server, real RSA-4096/AES-256
  # crypto, real Ethereum Sepolia transactions. Deliberately NOT run on
  # every push/PR: it's slow (blockchain confirmation alone is
  # ~10-30s per seal), costs real testnet gas each run, and rapid
  # back-to-back seals can trip a real nonce-collision edge case
  # ("replacement transaction underpriced"). Runs on manual dispatch only;
  # promote to `push` once that's been hardened if you want it gating merges.
  live-integration-tests:
    name: Live server + blockchain integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate a CI-only test signing key
        run: python keygen.py --non-interactive --passphrase karan

      - name: Start the API server in the background
        run: |
          nohup python -m uvicorn backend.api:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8000 > /dev/null; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Server never came up. Log:"
          cat server.log
          exit 1
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          SEPOLIA_WALLET: ${{ secrets.SEPOLIA_WALLET }}

      - name: Run comprehensive suite
        run: pytest tests/test_comprehensive_suite.py -v
